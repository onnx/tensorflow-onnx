name: Keras2onnx Unit Test Run
description: Run unit tests for keras2onnx

inputs:
  tf_version:
    description: 'TensorFlow version'
  python_version:
    description: 'Python version'
  ort_version:
    description: 'ONNXRuntime version'
  onnx_version:
    description: 'ONNX version'

runs:
  using: "composite"
  steps:
    - name: Set up Python (${{ inputs.python_version }})
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python_version }}

    - name: Install dependencies (TF-v${{ inputs.tf_version }})
      shell: bash
      env:
        TF_VERSION: ${{ inputs.tf_version }}
        ORT_VERSION: ${{ inputs.ort_version }}
        ONNX_VERSION: ${{ inputs.onnx_version }}
      run: |
          python -m pip install --upgrade pip
          pip install "numpy<2" onnx=="$ONNX_VERSION" onnxruntime=="$ORT_VERSION"
          pip install onnxconverter-common
          pip install parameterized
          pip install timeout-decorator
          pip install coloredlogs flatbuffers
          pip install tensorflow=="$TF_VERSION"
          pip install pytest pytest-cov pytest-runner

          pip install -e .

          echo "----- List all of depdencies:"
          pip freeze --all

    - name: Run keras_unit_test
      shell: bash
      run: |
          python -c "import onnxruntime"
          python -c "import onnxconverter_common"
          pytest tests/keras2onnx_unit_tests --doctest-modules --junitxml=junit/test-results.xml
